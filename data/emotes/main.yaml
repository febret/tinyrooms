say:
  label: "💬"
  description: Say something
  msg:
    - verb: ["You say", "$0 says"]
      target: "to $1"
  animations: "!0"

smile:
  label: "😊"
  description: Smile
  msg:
    - verb: ["You smile", "$0 smiles"]
      target: "at $1"
  animations: "!0"

hug:
  label: "🤗"
  description: Give a warm hug
  msg:
    - verb: ["You hug", "$0 hugs"]
      end: ["💕", "warmly", "☺️", "squeeze!"]
  animations: "!0"

wink:
  label: "😉"
  description: Give a cheeky wink
  msg:
    - verb: ["You wink", "$0 winks"]
      target: "at $1"
      end: ["😏", "sneakily", "👁️"]
  animations: "!0"

giggle:
  label: "🤭"
  description: Laugh softly
  msg:
    - verb: ["You giggle", "$0 giggles"]
      target: "at $1"
      end: ["hehe", "tee-hee!", "😂"]
  animations: "!0"

wave:
  label: "👋"
  description: Wave at someone
  msg:
    - verb: ["You wave", "$0 waves"]
      target: "at $1"
  animations: "!0"
