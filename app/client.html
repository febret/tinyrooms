<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tinyrooms Client</title>
  <link rel="stylesheet" href="/app/client.css">
  <link rel="stylesheet" href="/app/room.css">
  <link id="skin-style" rel="stylesheet" href="/app/base.css">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.17.0/dist/pixi.min.js"></script>
</head>
<body>
  <div id="loginPage">
    <h3>Login</h3>
    <div class="input-group">
      <label for="username">Username</label>
      <input id="username" type="text" autocomplete="username" />
    </div>
    <div class="input-group">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" />
    </div>
    <div>
      <button id="btnLogin">Login</button>
      <button id="btnRegister">Register (local)</button>
    </div>
    <div id="loginStatus"></div>
  </div>

  <div id="mainPage" style="display:none; margin-top:1rem;">
    <div id="statusPanel">
      <div id="statusDisplay"></div>
      <div class="status-controls">
        <div id="connectionIndicator" class="connection-indicator connecting" title="Click for connection info"></div>
        <button id="btnLogout" style="margin: 0; padding: 0.4rem 0.8rem; background: #dc3545;">Exit</button>
      </div>
    </div>

    <div id="viewPanel">
      <div id="viewStageWrap">
        <div id="roomCanvas"></div>
        <div id="roomTitleOverlay"></div>
        <div id="roomExits"></div>
        <div id="logPanel">
          <div id="messages">
            <div id="chatLogList"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="controlsPanel">
      <div id="interactionPanel">
        <div id="actionsPanel">
          <div id="actionPalette"></div>
          <div id="lookBox"></div>
          <div class="message-input-container">
            <input id="msgInput" type="text" placeholder="Type a message" />
            <button id="sendBtn">➤</button>
          </div>
        </div>
        <div id="inventoryPanel">
          <div id="inventoryHeader" class="inventory-header">Inventory</div>
          <div id="inventoryList" class="inventory-list"></div>
          <div id="activityPanel"></div>
        </div>
      </div>
    </div>
  </div>
  <div style="display:none;">
    <button id="btnCharacterEditor">Modify Character</button>
    <button id="btnWorldEditor" style="display:none;">World Editor</button>
  </div>

  <div id="characterEditorPage" style="display:none;">
    <div class="character-editor-card">
      <div class="character-editor-header">
        <h3>Character Editor</h3>
        <button id="btnCharacterEditorClose">✕</button>
      </div>
      <div id="characterEditorError" class="character-editor-error"></div>
      <div class="character-descriptor">
        <div class="character-descriptor-label">Description</div>
        <textarea id="characterEditorDescription" rows="3" maxlength="280" placeholder="Describe your character..."></textarea>
      </div>
      <div class="character-editor-panels">
        <div class="character-editor-panel">
          <div class="character-descriptor-label">Sprite</div>
          <div id="characterEditorSpriteList" class="character-sprite-list"></div>
        </div>
        <div class="character-editor-panel">
          <div class="character-descriptor-label">Main image</div>
          <div id="characterEditorMainImagePreview" class="character-main-image-preview"></div>
          <div class="character-editor-actions">
            <button id="btnCharacterGenerateMainImage">Generate Main Image</button>
          </div>
        </div>
      </div>
      <div class="character-editor-footer">
        <button id="btnCharacterSave">Save</button>
        <button id="btnCharacterEditorDone">Done</button>
      </div>
    </div>
  </div>

  <div id="objectCreatorPage" style="display:none;">
    <div class="character-editor-card">
      <div class="character-editor-header">
        <h3>Create Thing</h3>
        <button id="btnObjectCreatorClose">✕</button>
      </div>
      <div id="objectCreatorError" class="character-editor-error"></div>
      <div class="character-descriptor">
        <div class="character-descriptor-label">Object description</div>
        <textarea id="objectCreatorDescription" rows="3" maxlength="280" placeholder="Describe the object you want to create..."></textarea>
      </div>
      <div class="character-editor-panels">
        <div class="character-editor-panel">
          <div class="character-descriptor-label">Sprite</div>
          <div id="objectCreatorSpriteList" class="character-sprite-list"></div>
        </div>
        <div class="character-editor-panel">
          <div class="character-descriptor-label">Image</div>
          <div id="objectCreatorImagePreview" class="character-main-image-preview"></div>
          <div class="character-editor-actions">
            <button id="btnObjectCreatorGenerateImage">Generate Image</button>
          </div>
        </div>
      </div>
      <div class="character-editor-footer">
        <button id="btnObjectCreatorCreate">Create Thing</button>
        <button id="btnObjectCreatorDone">Done</button>
      </div>
    </div>
  </div>

<script src="/app/utils.js"></script>
<script src="/app/charEditor.js"></script>
<script src="/app/objectEditor.js"></script>
<script src="/app/prop.js"></script>
<script src="/app/stage.js"></script>
<script src="/app/actionPanel.js"></script>
<script src="/app/client.js"></script>
<script src="/app/sound.js"></script>
<script src="/app/text.js"></script>
<script src="/app/state.js"></script>
<script src="/app/login.js"></script>
<script src="/app/ui.js"></script>

</html>
